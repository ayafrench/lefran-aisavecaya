<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - Madame Aya</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #edf2f7; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; color: #2d3748; }
        .dashboard-stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .stat-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; flex: 1; max-width: 200px; border-bottom: 4px solid #3182ce; }
        .stat-box h3 { margin: 0; color: #718096; font-size: 16px; }
        .stat-box p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #2d3748; }
        
        .admin-container { display: flex; gap: 20px; max-width: 1200px; margin: auto; flex-wrap: wrap; align-items: flex-start;}
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; min-width: 350px; margin-bottom: 20px;}
        h2 { border-bottom: 2px solid #3182ce; padding-bottom: 10px; margin-bottom: 20px; color: #2b6cb0; font-size: 20px;}
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; outline: none; }
        button { background-color: #3182ce; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2b6cb0; }
        
        .question-block { background: #f7fafc; border: 1px dashed #a0aec0; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; }
        .remove-q-btn { position: absolute; top: 5px; left: 5px; background: #e53e3e; width: auto; padding: 5px 10px; font-size: 12px; }
        .add-q-btn { background-color: #48bb78; margin-bottom: 20px; }
        
        .lesson-item { background: #f7fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #e53e3e; width: auto; padding: 8px 15px; margin: 0; }
        .logout-btn { background-color: #718096; width: auto; position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

    <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>

    <div class="header">
        <h1>👑 لوحة تحكم الإدارة</h1>
        <p>مرحباً مادام آية</p>
    </div>

    <!-- الإحصائيات -->
    <div class="dashboard-stats">
        <div class="stat-box"><h3>👁️ إجمالي زوار الموقع</h3><p id="totalVisitors">0</p></div>
        <div class="stat-box"><h3>📚 الدروس المرفوعة</h3><p id="totalLessons">0</p></div>
    </div>

    <div class="admin-container">
        <!-- قسم إضافة الفيديوهات والأسئلة اللانهائية -->
        <div class="card" style="flex: 2;">
            <h2>➕ إضافة درس جديد</h2>
            <select id="gradeLevel">
                <option value="4_primary">الصف الرابع الابتدائي</option>
                <option value="1_prep">الصف الأول الإعدادي</option>
                <option value="1_sec">الصف الأول الثانوي</option>
                <!-- ضيفي باقي المراحل هنا -->
            </select>
            <input type="text" id="videoTitle" placeholder="عنوان الدرس">
            <input type="text" id="youtubeLink" placeholder="رابط فيديو اليوتيوب">
            
            <h3 style="color:#4a5568; margin: 20px 0 10px;">❓ أسئلة الدرس (اختياري)</h3>
            <div id="questionsContainer"></div>
            <button class="add-q-btn" id="addQuestionBtn">➕ إضافة سؤال جديد</button>
            
            <button id="addVideoBtn" style="background-color: #2c3e50; font-size: 18px; padding: 15px;">🚀 نشر الدرس بالأسئلة</button>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 300px;">
            <!-- قسم الروابط -->
            <div class="card">
                <h2>🔗 روابط السوشيال ميديا</h2>
                <input type="text" id="fbLink" placeholder="رابط صفحة الفيسبوك">
                <input type="text" id="ytLink" placeholder="رابط قناة اليوتيوب">
                <button id="saveLinksBtn" style="background-color: #e67e22;">حفظ الروابط</button>
            </div>

            <!-- قسم إدارة الدروس -->
            <div class="card">
                <h2>📂 إدارة الدروس</h2>
                <div id="allLessonsContainer" style="max-height: 400px; overflow-y: auto;">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, setDoc, getDoc, onAuthStateChanged, signOut } from './firebase-config.js';

        onAuthStateChanged(auth, (user) => { if (!user || user.email !== "yonisaya123@gmail.com") window.location.href = "courses.html"; });
        document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

        // 1. نظام الأسئلة المتعددة
        const qContainer = document.getElementById("questionsContainer");
        let qCount = 0;

        document.getElementById("addQuestionBtn").addEventListener("click", () => {
            qCount++;
            const qDiv = document.createElement("div");
            qDiv.className = "question-block";
            qDiv.innerHTML = `
                <button class="remove-q-btn" onclick="this.parentElement.remove()">❌ حذف</button>
                <input type="text" class="q-text" placeholder="اكتب السؤال هنا (مثال: ما معنى كلمة Bonjour؟)">
                <input type="text" class="q-opt1" placeholder="الاختيار الأول">
                <input type="text" class="q-opt2" placeholder="الاختيار الثاني">
                <input type="text" class="q-opt3" placeholder="الاختيار الثالث">
                <select class="q-correct">
                    <option value="1">الاختيار الأول هو الصحيح</option>
                    <option value="2">الاختيار الثاني هو الصحيح</option>
                    <option value="3">الاختيار الثالث هو الصحيح</option>
                </select>
            `;
            qContainer.appendChild(qDiv);
        });

        // 2. نشر الفيديو بالأسئلة
        document.getElementById("addVideoBtn").addEventListener("click", async () => {
            const level = document.getElementById("gradeLevel").value;
            const title = document.getElementById("videoTitle").value;
            const link = document.getElementById("youtubeLink").value;
            
            if(!title || !link) return alert("يرجى إدخال عنوان الدرس ورابط اليوتيوب.");

            // تجميع الأسئلة في مصفوفة (Array)
            let questionsArray = [];
            document.querySelectorAll('.question-block').forEach(block => {
                const text = block.querySelector('.q-text').value;
                if(text) {
                    questionsArray.push({
                        q: text,
                        opt1: block.querySelector('.q-opt1').value,
                        opt2: block.querySelector('.q-opt2').value,
                        opt3: block.querySelector('.q-opt3').value,
                        correct: block.querySelector('.q-correct').value
                    });
                }
            });

            document.getElementById("addVideoBtn").innerText = "جاري النشر...";
            
            await addDoc(collection(db, "playlists"), { 
                grade: level, title: title, url: link, 
                questions: questionsArray, // رفع المصفوفة
                views: 0, likes: 0 // تصفير العدادات الجديدة
            });
            
            alert("✅ تم نشر الدرس!");
            window.location.reload(); // إعادة تحميل الصفحة لتنظيف الخانات
        });

        // 3. إدارة السوشيال ميديا والإحصائيات
        async function loadDashboardData() {
            // جلب الإحصائيات
            const statsSnap = await getDoc(doc(db, "settings", "stats"));
            if (statsSnap.exists()) {
                document.getElementById("totalVisitors").innerText = statsSnap.data().visitors || 0;
            }

            // جلب الروابط الحالية
            const contactSnap = await getDoc(doc(db, "settings", "contact"));
            if (contactSnap.exists()) {
                document.getElementById("fbLink").value = contactSnap.data().facebook || "";
                document.getElementById("ytLink").value = contactSnap.data().youtube || "";
            }

            // جلب الدروس
            const container = document.getElementById("allLessonsContainer");
            const querySnapshot = await getDocs(collection(db, "playlists"));
            document.getElementById("totalLessons").innerText = querySnapshot.size;
            container.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                container.innerHTML += `
                    <div class="lesson-item">
                        <div>
                            <h4>${data.title}</h4>
                            <small>👀 ${data.views || 0} | 👍 ${data.likes || 0}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteVideo('${docSnap.id}')">حذف</button>
                    </div>`;
            });
        }
        
        window.deleteVideo = async (id) => {
            if(confirm("هل أنت متأكد من الحذف؟")) { 
                await deleteDoc(doc(db, "playlists", id)); 
                loadDashboardData(); 
            }
        }

        document.getElementById("saveLinksBtn").addEventListener("click", async () => {
            await setDoc(doc(db, "settings", "contact"), {
                facebook: document.getElementById("fbLink").value,
                youtube: document.getElementById("ytLink").value
            }, { merge: true });
            alert("تم حفظ الروابط بنجاح!");
        });

        loadDashboardData();
    </script>
</body>
</html>

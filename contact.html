<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - Le Français avec Madame Aya</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        
        /* إخفاء شريط جوجل المزعج من الأعلى */
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
        
        nav { background-color: #2c3e50; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 15px;}
        .logo { color: white; font-size: 24px; font-weight: 900; }
        .nav-links { list-style: none; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav-links li a { color: white; text-decoration: none; font-size: 18px; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        .nav-links li a:hover, .active { background-color: #e74c3c; }

        .contact-container { max-width: 800px; margin: 50px auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 30px; }
        .contact-info, .contact-form { flex: 1; min-width: 300px; }
        
        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 28px; }
        p { font-size: 16px; color: #777; margin-bottom: 20px; }
        
        /* أزرار السوشيال ميديا */
        .social-links { display: flex; flex-direction: column; gap: 15px; }
        .social-btn { display: block; padding: 12px; font-size: 18px; font-weight: bold; color: white; text-decoration: none; border-radius: 8px; text-align: center; transition: 0.3s; }
        .social-btn:hover { transform: scale(1.05); }
        .btn-wa { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-ig { background-color: #E1306C; }

        /* نموذج إرسال الإيميل (الفورم) */
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        .contact-form textarea { height: 120px; resize: none; }
        .contact-form button { width: 100%; padding: 15px; background-color: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .contact-form button:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🇫🇷 Madame Aya</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="contact.html" class="active">تواصل معنا</a></li>
            <li><a href="courses.html">المنصة التعليمية</a></li>
            <!-- زر الترجمة -->
            <li><div id="google_translate_element"></div></li>
        </ul>
    </nav>

    <div class="contact-container">
        <!-- الجزء الأول: إرسال رسالة للإيميل -->
        <div class="contact-form">
            <h1>إرسال رسالة ✉️</h1>
            <p>أرسل استفسارك وسنقوم بالرد عليك في أقرب وقت عبر البريد الإلكتروني.</p>
            
            <!-- أداة FormSubmit لإرسال الإيميل -->
            <form action="https://formsubmit.co/yonisaya123@gmail.com" method="POST">
                <!-- لمنع صفحة التأكيد المزعجة (اختياري) -->
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="رسالة جديدة من منصة Madame Aya">
                
                <input type="text" name="name" placeholder="اسمك الكريم" required>
                <input type="email" name="email" placeholder="بريدك الإلكتروني" required>
                <textarea name="message" placeholder="اكتب رسالتك أو استفسارك هنا..." required></textarea>
                <button type="submit">إرسال الرسالة</button>
            </form>
        </div>

        <!-- الجزء الثاني: روابط السوشيال ميديا (من قاعدة البيانات) -->
        <div class="contact-info">
            <h1>حساباتنا الرسمية 📱</h1>
            <p>يمكنك أيضاً التواصل معنا عبر المنصات التالية:</p>
            <div class="social-links">
                <a href="#" id="wa-link" target="_blank" class="social-btn btn-wa">التواصل عبر WhatsApp</a>
                <a href="#" id="fb-link" target="_blank" class="social-btn btn-fb">صفحتنا على Facebook</a>
                <a href="#" id="ig-link" target="_blank" class="social-btn btn-ig">حسابنا على Instagram</a>
            </div>
        </div>
    </div>

    <!-- أكواد جلب السوشيال ميديا والترجمة -->
    <script type="module">
        import { db, doc, getDoc } from './firebase-config.js';
        async function loadContactLinks() {
            try {
                const docSnap = await getDoc(doc(db, "settings", "contact"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.whatsapp) document.getElementById("wa-link").href = data.whatsapp;
                    if(data.facebook) document.getElementById("fb-link").href = data.facebook;
                    if(data.instagram) document.getElementById("ig-link").href = data.instagram;
                }
            } catch (error) {}
        }
        loadContactLinks();
    </script>

    <!-- سكريبت الترجمة (عربي، إنجليزي، فرنسي) -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ar', 
                includedLanguages: 'ar,en,fr', // اللغات المحددة فقط
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>

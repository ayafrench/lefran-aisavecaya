<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - Le Français avec Aya Wael</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        
        nav { background-color: #2c3e50; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .logo { color: white; font-size: 24px; font-weight: 900; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links li a { color: white; text-decoration: none; font-size: 18px; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        .nav-links li a:hover, .active { background-color: #e74c3c; }

        .contact-container { max-width: 600px; margin: 80px auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .contact-container h1 { color: #2c3e50; margin-bottom: 20px; font-size: 32px; }
        .contact-container p { font-size: 18px; color: #777; margin-bottom: 40px; }
        
        .social-links { display: flex; flex-direction: column; gap: 20px; }
        .social-btn { display: block; padding: 15px; font-size: 20px; font-weight: bold; color: white; text-decoration: none; border-radius: 10px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .social-btn:hover { transform: scale(1.05); }
        
        .btn-wa { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-ig { background-color: #E1306C; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🇫🇷 Miss Aya</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="contact.html" class="active">تواصل معنا</a></li>
            <li><a href="courses.html">المنصة التعليمية</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h1>يسعدنا تواصلكم معنا 📬</h1>
        <p>لأي استفسار بخصوص الكورسات، أو للاشتراك في الدروس الخاصة، يرجى التواصل معنا عبر المنصات التالية:</p>
        
        <div class="social-links">
            <a href="#" id="wa-link" target="_blank" class="social-btn btn-wa">التواصل عبر WhatsApp</a>
            <a href="#" id="fb-link" target="_blank" class="social-btn btn-fb">صفحتنا على Facebook</a>
            <a href="#" id="ig-link" target="_blank" class="social-btn btn-ig">حسابنا على Instagram</a>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc } from './firebase-config.js';

        async function loadContactLinks() {
            try {
                const docSnap = await getDoc(doc(db, "settings", "contact"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(data.whatsapp) document.getElementById("wa-link").href = data.whatsapp;
                    if(data.facebook) document.getElementById("fb-link").href = data.facebook;
                    if(data.instagram) document.getElementById("ig-link").href = data.instagram;
                }
            } catch (error) {
                console.log("خطأ في جلب الروابط:", error);
            }
        }
        loadContactLinks();
    </script>
</body>
</html>

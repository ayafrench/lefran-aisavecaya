<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الطالب - Le Français avec Aya Wael</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #0056b3; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #004494; }
        .logout-btn { background-color: #dc3545; margin-top: 20px; }
        .video-card { background: #e9ecef; margin: 15px 0; padding: 15px; border-radius: 5px; text-align: right; border-right: 5px solid #0056b3; }
        .video-card h3 { margin-top: 0; color: #333; }
        .video-card a { text-decoration: none; color: white; background-color: #ff0000; padding: 8px 15px; border-radius: 5px; display: inline-block; margin-top: 10px; font-weight: bold;}
        .video-card a:hover { background-color: #cc0000; }
    </style>
</head>
<body>

    <div class="container">
        <h2>مرحباً بك في منصة Le Français avec Aya Wael 🇫🇷</h2>
        <p>اختر المرحلة الدراسية لعرض الكورسات والدروس المتاحة</p>

        <!-- قائمة اختيار المرحلة الدراسية -->
        <select id="gradeSelect">
            <option value="">-- اختر المرحلة الدراسية --</option>
            <option value="4_primary">الصف الرابع الابتدائي</option>
            <option value="5_primary">الصف الخامس الابتدائي</option>
            <option value="6_primary">الصف السادس الابتدائي</option>
            <option value="1_prep">الصف الأول الإعدادي</option>
            <option value="2_prep">الصف الثاني الإعدادي</option>
            <option value="3_prep">الصف الثالث الإعدادي</option>
            <option value="1_sec">الصف الأول الثانوي</option>
            <option value="2_sec">الصف الثاني الثانوي</option>
            <option value="3_sec">الصف الثالث الثانوي</option>
        </select>

        <button id="fetchVideosBtn">عرض الفيديوهات</button>

        <!-- المكان الذي ستظهر فيه الفيديوهات -->
        <div id="playlistContainer">
            <!-- سيتم إضافة الدروس هنا تلقائياً -->
        </div>

        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
    </div>

    <script type="module">
        import { auth, db, collection, getDocs, query, where, onAuthStateChanged, signOut } from './firebase-config.js';

        // 1. التأكد من أن الطالب قام بتسجيل الدخول، لو لم يسجل يتم طرده للصفحة الرئيسية
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            }
        });

        // 2. جلب الفيديوهات عند الضغط على الزر
        document.getElementById("fetchVideosBtn").addEventListener("click", async () => {
            const selectedGrade = document.getElementById("gradeSelect").value;
            const container = document.getElementById("playlistContainer");
            
            container.innerHTML = ""; // مسح الفيديوهات القديمة لتجهيز المكان

            if (!selectedGrade) {
                alert("برجاء اختيار المرحلة الدراسية أولاً!");
                return;
            }

            container.innerHTML = "<p>جاري تحميل الدروس...</p>";

            try {
                // البحث في قاعدة البيانات عن الفيديوهات الخاصة بالمرحلة المختارة فقط
                const q = query(collection(db, "playlists"), where("grade", "==", selectedGrade));
                const querySnapshot = await getDocs(q);
                
                container.innerHTML = ""; // إخفاء كلمة "جاري التحميل"
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<p>لا توجد دروس مضافة لهذه المرحلة حالياً. سيتم إضافتها قريباً!</p>";
                    return;
                }

                // عرض كل فيديو تم إيجاده
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const videoCard = document.createElement("div");
                    videoCard.className = "video-card";
                    videoCard.innerHTML = `
                        <h3>${data.title}</h3>
                        <a href="${data.url}" target="_blank">▶️ مشاهدة على يوتيوب</a>
                    `;
                    container.appendChild(videoCard);
                });
            } catch (error) {
                console.error("خطأ في جلب البيانات: ", error);
                container.innerHTML = "<p>حدث خطأ أثناء تحميل الدروس. تأكد من اتصالك بالإنترنت.</p>";
            }
        });

        // 3. زر تسجيل الخروج
        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                alert("حدث خطأ أثناء تسجيل الخروج");
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الطلاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; margin: 0; padding: 0; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;}
        select, button { padding: 12px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        button { background-color: #3498db; color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; transform: scale(1.05); }
        .logout-btn { background-color: #e74c3c; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .video-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.15); transform: translateY(-5px); }
        .video-card iframe { width: 100%; height: 200px; border: none; }
        .video-info { padding: 15px; text-align: center; }
        .video-info h3 { color: #2c3e50; font-size: 18px; margin: 0; }
    </style>
</head>
<body>

    <header>
        <h1>👨‍🎓 مرحباً بك في الكورس</h1>
    </header>

    <div class="container">
        <div class="controls">
            <select id="gradeSelect">
                <option value="">-- اختر المرحلة الدراسية --</option>
                <option value="4_primary">الصف الرابع الابتدائي</option>
                <option value="5_primary">الصف الخامس الابتدائي</option>
                <option value="6_primary">الصف السادس الابتدائي</option>
                <option value="1_prep">الصف الأول الإعدادي</option>
                <option value="2_prep">الصف الثاني الإعدادي</option>
                <option value="3_prep">الصف الثالث الإعدادي</option>
                <option value="1_sec">الصف الأول الثانوي</option>
                <option value="2_sec">الصف الثاني الثانوي</option>
                <option value="3_sec">الصف الثالث الثانوي</option>
            </select>
            <button id="fetchVideosBtn">عرض الدروس</button>
            <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
        </div>

        <div id="playlistContainer" class="video-grid"></div>
    </div>

    <script type="module">
        import { auth, db, collection, getDocs, query, where, onAuthStateChanged, signOut } from './firebase-config.js';

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

        // دالة لتحويل رابط يوتيوب العادي لرابط تشغيل داخل الموقع (Embed)
        function getYouTubeEmbedUrl(url) {
            let videoId = "";
            if (url.includes("v=")) videoId = url.split("v=")[1].substring(0, 11);
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].substring(0, 11);
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        document.getElementById("fetchVideosBtn").addEventListener("click", async () => {
            const selectedGrade = document.getElementById("gradeSelect").value;
            const container = document.getElementById("playlistContainer");
            if (!selectedGrade) return alert("اختر المرحلة أولاً!");
            
            container.innerHTML = "<h3 style='text-align:center; width:100%;'>جاري التحميل...</h3>";

            try {
                const q = query(collection(db, "playlists"), where("grade", "==", selectedGrade));
                const querySnapshot = await getDocs(q);
                container.innerHTML = ""; 

                if (querySnapshot.empty) {
                    container.innerHTML = "<h3 style='text-align:center; width:100%; color:#777;'>لا توجد دروس حالياً لهذه المرحلة.</h3>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const embedUrl = getYouTubeEmbedUrl(data.url) || data.url; // تحويل الرابط

                    container.innerHTML += `
                        <div class="video-card">
                            <iframe src="${embedUrl}" allowfullscreen></iframe>
                            <div class="video-info">
                                <h3>${data.title}</h3>
                            </div>
                        </div>
                    `;
                });
            } catch (error) { alert("حدث خطأ في تحميل الدروس"); }
        });

        document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - Le Français avec Aya Wael</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f8f9fa; color: #333; line-height: 1.6; }
        
        /* شريط التنقل (Navbar) */
        nav { background-color: #2c3e50; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .logo { color: white; font-size: 24px; font-weight: 900; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links li a { color: white; text-decoration: none; font-size: 18px; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        .nav-links li a:hover, .active { background-color: #e74c3c; }

        /* منطقة الترحيب */
        .hero { background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); color: white; text-align: center; padding: 100px 20px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: 50px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .hero p { font-size: 22px; margin-bottom: 40px; max-width: 700px; }
        .start-btn { background-color: #e74c3c; color: white; padding: 15px 40px; font-size: 22px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .start-btn:hover { background-color: #c0392b; transform: translateY(-5px); }
    </style>
</head>
<body>

    <!-- شريط التنقل الثابت في كل الصفحات -->
    <nav>
        <div class="logo">🇫🇷 Miss Aya</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">الرئيسية</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="contact.html">تواصل معنا</a></li>
            <li><a href="courses.html">المنصة التعليمية</a></li>
        </ul>
    </nav>

    <!-- محتوى الرئيسية -->
    <div class="hero">
        <h1>طريقك لإتقان اللغة الفرنسية</h1>
        <p>مرحباً بك في منصتك التعليمية المتكاملة. شروحات تفاعلية، فيديوهات ممتعة، وتدريبات مستمرة لضمان تفوقك في مادة اللغة الفرنسية من المرحلة الابتدائية وحتى الثانوية.</p>
        <a href="courses.html" class="start-btn">🚀 ابدأ التعلم الآن</a>
    </div>

</body>
</html>
